<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Study Runner</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/iconoir/css/iconoir.css">
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="ambient"><div class="orb"></div><div class="orb"></div></div>

<div id="screen-welcome" class="screen active">
  <div class="q-type-tag"><i class="iconoir-brain"></i> Study Runner</div>
  <h1 class="screen-title">Welcome</h1>
  <p class="screen-sub">Enter your anonymous Participant-ID and confirm your consent.</p>
  <label class="mono-label">Participant-ID</label>
  <input class="fi-input" type="text" id="pid-input" placeholder="e.g. US1_P04" autocomplete="off">
  <label class="consent-row" for="consent-check">
    <input type="checkbox" id="consent-check">
    <span>I agree to the anonymized recording of my responses as part of this study.</span>
  </label>
  <button class="btn btn--fill" id="btn-start" disabled type="button">
    <i class="iconoir-play-solid"></i> Start study
  </button>
</div>

<!-- One card is visible at a time. Navigation controls appear below. -->
<div id="screen-questions" class="screen">
  <div id="q-container"></div>
  <div class="q-nav">
    <button class="q-nav-btn q-nav-btn--back" id="btn-prev" type="button" aria-label="Previous question">
      <i class="iconoir-nav-arrow-left"></i>
    </button>
    <span class="q-counter" id="q-counter"></span>
    <button class="q-nav-btn q-nav-btn--next" id="btn-next" type="button">
      <span id="btn-next-label">Next</span>
      <i class="iconoir-nav-arrow-right" id="btn-next-icon"></i>
    </button>
  </div>
</div>

<div id="screen-done" class="screen screen--center">
  <div class="done-icon"><i class="iconoir-check"></i></div>
  <h1 class="screen-title">Thank you!</h1>
  <p class="screen-sub">Your answers have been saved.<br>You can now put the device down.</p>
</div>

<script type="module" src="/static/js/study-controller.js"></script>
</body>
</html>
