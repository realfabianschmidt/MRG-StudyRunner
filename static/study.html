<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Study Runner</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/iconoir/css/iconoir.css">
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="ambient"><div class="orb"></div><div class="orb"></div></div>
<div class="study-fullscreen-ui" id="study-fullscreen-ui" hidden>
  <button class="study-fullscreen-btn" id="btn-study-fullscreen" type="button" aria-label="Vollbild aktivieren" title="Vollbild">
    <i class="iconoir-expand"></i>
  </button>
</div>

<!-- One card is visible at a time. Navigation controls appear below. -->
<div id="screen-questions" class="screen active">
  <div id="q-container"></div>
  <div class="q-nav">
    <button class="q-nav-btn q-nav-btn--back" id="btn-prev" type="button" aria-label="Previous question">
      <i class="iconoir-nav-arrow-left"></i>
    </button>
    <span class="q-counter" id="q-counter"></span>
    <button class="q-nav-btn q-nav-btn--next" id="btn-next" type="button">
      <span id="btn-next-label">Next</span>
      <i class="iconoir-nav-arrow-right" id="btn-next-icon"></i>
    </button>
  </div>
</div>

<div id="screen-done" class="screen screen--center">
  <div class="done-icon"><i class="iconoir-check"></i></div>
  <h1 class="screen-title">Thank you!</h1>
  <p class="screen-sub">Your answers have been saved.<br>You can now put the device down.</p>
</div>

<script type="module" src="/static/js/study-controller.js"></script>
</body>
</html>
